# AIDA - Universal Axes Definition
# Based on: Arnheim (visual perception), Osgood (semantic differential),
#           Berlyne (experimental aesthetics), Itten (color theory)
#
# Each axis is bipolar, normalized [0, 1].
# pole_low = value 0.0, pole_high = value 1.0
#
# evocation: natural language describing the feeling at each pole (feeds Flux/human)
# tokens: parametric keywords weighted by axis value (feeds prompt weighting)

families:

  # ===================================================================
  # STRUCTURE — Arnheim: form, balance, space
  # ===================================================================
  structure:
    description: "Formal spatial and geometric properties"
    axes:
      - id: shape
        poles: [geometric, organic]
        description: "Shape language: angular/constructed vs curved/natural"
        evocation:
          0.0: "Hard edges and precise angles, constructed forms built with ruler and compass, crystalline geometry"
          0.5: "A conversation between structure and nature, edges softening into curves"
          1.0: "Flowing organic forms that breathe and grow, shapes born from nature's patient hand"
        tokens:
          low: [geometric, angular, sharp, polygonal, faceted, crystalline, constructed]
          high: [organic, curved, flowing, biomorphic, natural, sinuous, grown]

      - id: complexity
        poles: [minimal, elaborate]
        description: "Level of detail and ornamentation"
        evocation:
          0.0: "The power of emptiness, stripped to its essence, every element earns its place"
          0.5: "Enough detail to intrigue, enough restraint to breathe"
          1.0: "Every surface tells a story, layers upon layers of intricate ornamentation, overwhelming richness"
        tokens:
          low: [minimal, simple, clean, sparse, bare, essential, austere]
          high: [elaborate, intricate, ornate, detailed, complex, decorated, embellished]

      - id: space
        poles: [open, enclosed]
        description: "Spatial feel: airy/expansive vs enclosed/tight"
        evocation:
          0.0: "Vast horizons stretching endlessly, the liberating vertigo of open space"
          0.5: "A room with windows, contained yet connected to what lies beyond"
          1.0: "Walls pressing close, the intimate weight of enclosure, air thick with presence"
        tokens:
          low: [open, vast, expansive, airy, wide, horizon, boundless]
          high: [enclosed, tight, claustrophobic, confined, narrow, compressed, intimate]

      - id: balance
        poles: [symmetric, asymmetric]
        description: "Compositional balance"
        evocation:
          0.0: "Perfect mirror harmony, the serenity of order, everything in its ordained place"
          0.5: "Balanced but alive, a slight tilt that keeps the eye moving"
          1.0: "Deliberate imbalance that creates tension, the dynamic energy of the unexpected"
        tokens:
          low: [symmetrical, centered, balanced, ordered, harmonious, stable]
          high: [asymmetrical, off-center, unbalanced, dynamic, irregular, disrupted]

      - id: scale
        poles: [intimate, monumental]
        description: "Perceived scale and grandeur"
        evocation:
          0.0: "Small enough to hold in your hands, the quiet poetry of miniature worlds"
          0.5: "Human-sized, relatable, built for the body"
          1.0: "Towering beyond comprehension, the crushing grandeur that makes you feel small and ancient"
        tokens:
          low: [intimate, small, personal, miniature, delicate, close]
          high: [monumental, grand, imposing, massive, colossal, towering, epic]

      - id: density
        poles: [sparse, dense]
        description: "Visual density and information load"
        evocation:
          0.0: "Breathing room between every element, silence made visible, the weight of what's absent"
          0.5: "A comfortable fullness, neither empty nor crowded"
          1.0: "Every inch alive with information, a visual cacophony that rewards slow looking"
        tokens:
          low: [sparse, minimal, breathing, empty, clean, isolated]
          high: [dense, packed, layered, busy, crowded, teeming, rich]

  # ===================================================================
  # COLOR — Itten: 7 color contrasts
  # ===================================================================
  color:
    description: "Chromatic properties based on Itten's color theory"
    axes:
      - id: value
        poles: [light, dark]
        description: "Overall lightness/darkness"
        evocation:
          0.0: "Flooded with light, bleached and luminous, the blinding clarity of noon"
          0.5: "The soft democracy of middle tones, neither shadow nor glare"
          1.0: "Swallowed by darkness, shapes emerging from shadow, the weight of unlit spaces"
        tokens:
          low: [bright, luminous, white, radiant, high-key, bleached]
          high: [dark, shadowy, murky, black, low-key, tenebrous, void]

      - id: saturation
        poles: [desaturated, saturated]
        description: "Color intensity/purity"
        evocation:
          0.0: "Color drained to whispers, the quiet dignity of ash and bone, monochrome memories"
          0.5: "Colors present but restrained, like a melody hummed softly"
          1.0: "Colors screaming at full volume, vivid and unapologetic, drenched in pure hue"
        tokens:
          low: [desaturated, muted, washed, greyscale, monochrome, faded, ashen]
          high: [saturated, vibrant, vivid, bold, intense, electric, drenched]

      - id: temperature
        poles: [cool, warm]
        description: "Color temperature"
        evocation:
          0.0: "Frozen stillness, icy blue light cutting through silence, the sharp clarity of winter air"
          0.5: "Neither inviting nor forbidding — a neutral threshold between states"
          1.0: "Golden firelight embracing stone walls, amber warmth radiating from deep within, the glow of embers"
        tokens:
          low: [cold, icy, blue, teal, frost, winter, glacial]
          high: [warm, golden, amber, orange, fire, ember, molten]

      - id: contrast
        poles: [low, high]
        description: "Contrast between light and dark areas"
        evocation:
          0.0: "Everything bathed in the same soft non-light, no drama, no shadows, flat and even"
          0.5: "Natural light and shadow playing together, readable depth"
          1.0: "Brutal chiaroscuro carving the world into light and void, theatrical and unforgiving"
        tokens:
          low: [flat, even, soft, diffused, gentle, uniform]
          high: [contrast, dramatic, chiaroscuro, stark, harsh, theatrical, bold]

      - id: palette
        poles: [monochrome, polychrome]
        description: "Color variety"
        evocation:
          0.0: "A single hue explored in all its depth, the discipline of one voice"
          0.5: "A curated family of related colors, harmonious and controlled"
          1.0: "The full spectrum unleashed, a carnival of competing hues, chromatic abundance"
        tokens:
          low: [monochromatic, tonal, single-hue, limited, restrained]
          high: [polychromatic, colorful, rainbow, diverse, multicolored, chromatic]

      - id: dominant_hue
        type: hue_angle
        range: [0, 360]
        description: "Dominant hue angle (0=red, 60=yellow, 120=green, 180=cyan, 240=blue, 300=magenta)"
        evocation:
          0: "The urgency of red — blood, fire, danger, passion"
          60: "The optimism of yellow — sunlight, gold, warning, energy"
          120: "The patience of green — growth, decay, nature, poison"
          180: "The distance of cyan — ice, technology, clinical clarity"
          240: "The depth of blue — night, ocean, melancholy, infinity"
          300: "The tension of magenta — artifice, fever, the edge of violet"
        tokens:
          0: [red, crimson, scarlet, vermillion, blood]
          60: [yellow, gold, amber, saffron, ochre]
          120: [green, emerald, jade, moss, verdant]
          180: [cyan, teal, turquoise, aqua]
          240: [blue, indigo, cobalt, sapphire, navy]
          300: [magenta, violet, purple, fuschia, plum]

  # ===================================================================
  # PERCEPTION — Berlyne: collative variables + Arnheim: dynamics
  # ===================================================================
  perception:
    description: "How the image is perceived and experienced"
    axes:
      - id: familiarity
        poles: [familiar, strange]
        description: "Novelty/familiarity — Berlyne's collative variable"
        evocation:
          0.0: "Immediately recognizable, the comfort of the known, nothing to decipher"
          0.5: "Something slightly off, familiar but tilted, a déjà vu that doesn't quite resolve"
          1.0: "Deeply alien, the uncanny made visible, forms that resist understanding"
        tokens:
          low: [familiar, conventional, recognizable, normal, everyday]
          high: [strange, surreal, uncanny, alien, bizarre, otherworldly, eldritch]

      - id: tension
        poles: [calm, tense]
        description: "Visual tension and energy"
        evocation:
          0.0: "Deep calm like still water, every element at rest, the silence after the storm"
          0.5: "A held breath, potential energy waiting to release"
          1.0: "Everything vibrating at breaking point, visual violence, the instant before the crash"
        tokens:
          low: [calm, serene, peaceful, tranquil, still, quiet, restful]
          high: [tense, aggressive, chaotic, intense, violent, explosive, volatile]

      - id: movement
        poles: [static, dynamic]
        description: "Implied motion and dynamism"
        evocation:
          0.0: "Frozen in amber, time suspended, the eternal stillness of a held pose"
          0.5: "A gentle drift, slow movement like clouds or tides"
          1.0: "Everything in motion, caught mid-leap, the blur of speed and force"
        tokens:
          low: [static, still, frozen, posed, stable, motionless, fixed]
          high: [dynamic, motion, kinetic, flowing, rushing, sweeping, turbulent]

      - id: readability
        poles: [ambiguous, readable]
        description: "Clarity of visual communication"
        evocation:
          0.0: "Meaning dissolved into abstraction, shapes that refuse to be named, open to interpretation"
          0.5: "Legible but layered, a clear surface with depths underneath"
          1.0: "Instantly understood, graphic and iconic, communication without ambiguity"
        tokens:
          low: [ambiguous, abstract, unclear, layered, mysterious, obscure]
          high: [clear, readable, graphic, iconic, obvious, legible, bold]

  # ===================================================================
  # SEMANTIC — Osgood EPA dimensions
  # ===================================================================
  semantic:
    description: "Subjective meaning — Osgood's Evaluation/Potency/Activity"
    axes:
      - id: evaluation
        poles: [repulsive, attractive]
        description: "Osgood E: good-bad, attractive-repulsive"
        evocation:
          0.0: "Visceral repulsion, the beauty of ugliness, deliberately disturbing and confrontational"
          0.5: "Neither seductive nor repellent — matter-of-fact existence"
          1.0: "Magnetic beauty that holds the gaze, elegance and grace made visible"
        tokens:
          low: [ugly, grotesque, disturbing, repulsive, harsh, brutal]
          high: [beautiful, elegant, attractive, graceful, refined, appealing]

      - id: potency
        poles: [fragile, powerful]
        description: "Osgood P: strong-weak"
        evocation:
          0.0: "Delicate as a breath on glass, forms that might dissolve if you look too hard"
          0.5: "Solid but not imposing, present without dominating"
          1.0: "Crushing weight and undeniable force, forms that command the space around them"
        tokens:
          low: [fragile, delicate, ethereal, light, wispy, gossamer, thin]
          high: [powerful, strong, heavy, solid, imposing, massive, forceful]

      - id: activity
        poles: [passive, active]
        description: "Osgood A: active-passive"
        evocation:
          0.0: "Dormant, waiting, the heavy patience of stone, existence without action"
          0.5: "Quietly alive, a pulse beneath the surface"
          1.0: "Crackling with energy, everything happening at once, restless and electric"
        tokens:
          low: [passive, dormant, inert, still, resting, sleeping, latent]
          high: [active, energetic, lively, animated, buzzing, kinetic, alive]

  # ===================================================================
  # RENDERING — generation-specific dimensions
  # ===================================================================
  rendering:
    description: "Technical rendering properties for image generation"
    axes:
      - id: realism
        poles: [abstract, photorealistic]
        description: "Level of representational fidelity"
        evocation:
          0.0: "Pure form and color freed from representation, the idea before the thing"
          0.5: "Stylized reality, the world seen through an artist's deliberate filter"
          1.0: "Indistinguishable from a photograph, every pore and reflection captured"
        tokens:
          low: [abstract, conceptual, non-representational, expressionist, painterly]
          high: [photorealistic, hyperrealistic, photograph, lifelike, rendered]

      - id: stroke
        poles: [thin, thick]
        description: "Line weight and stroke quality"
        evocation:
          0.0: "Hairline precision, the trembling accuracy of a needle on paper"
          0.5: "Confident mid-weight lines, neither precious nor crude"
          1.0: "Bold slashes of thick pigment, the decisive weight of a loaded brush"
        tokens:
          low: [thin, fine, delicate, hairline, precise, sharp]
          high: [thick, bold, chunky, heavy, broad, gestural, impasto]

      - id: texture
        poles: [smooth, textured]
        description: "Surface texture quality"
        evocation:
          0.0: "Surfaces like still water, flawless and untouched, the perfection of polished glass"
          0.5: "Tactile but not rough, surfaces that invite touch"
          1.0: "Every surface scarred and weathered, grain and grit you can almost feel, raw material honesty"
        tokens:
          low: [smooth, polished, glossy, clean, sleek, pristine]
          high: [textured, rough, gritty, grainy, weathered, tactile, raw]

      - id: materiality
        poles: [flat, volumetric]
        description: "Sense of 3D volume and material presence"
        evocation:
          0.0: "Pure surface, paper-thin reality, the elegant flatness of a woodblock print"
          0.5: "Suggestion of depth, forms gently emerging from the plane"
          1.0: "Sculptural presence you could walk around, weight and mass made undeniable"
        tokens:
          low: [flat, 2D, graphic, paper, cut-out, silhouette]
          high: [volumetric, 3D, sculptural, tangible, solid, dimensional, carved]

      - id: finish
        poles: [raw, polished]
        description: "Level of finish and polish"
        evocation:
          0.0: "The honest roughness of first marks, process visible, nothing hidden or smoothed away"
          0.5: "Worked but not overworked, craft visible but controlled"
          1.0: "Every edge refined, every surface resolved, the invisible labor of total polish"
        tokens:
          low: [raw, rough, unfinished, sketch, crude, loose, gestural]
          high: [polished, refined, finished, professional, perfect, clean, precise]
